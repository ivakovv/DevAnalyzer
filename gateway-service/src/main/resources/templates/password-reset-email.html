<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background-color: #0a0a0f;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #0a0a0f; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0" style="background-color: #1a1a24; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #1a1a24; padding: 30px 30px 20px 30px; text-align: center;">
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center">
                                        <img src="cid:logo" alt="Logo" style="width: 48px; height: 48px; display: inline-block; vertical-align: middle; margin-right: 12px;">
                                        <span style="color: #ffffff; font-size: 20px; font-weight: 600; display: inline-block; vertical-align: middle;">{{appName}}</span>
                                    </td>
                                </tr>
                            </table>
                            <h1 style="color: #ffffff; margin: 16px 0 0 0; font-size: 24px; font-weight: 600;">Сброс пароля</h1>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 20px 30px 30px 30px; background-color: #1a1a24; text-align: center;">
                            <p style="color: #a0a0b0; line-height: 1.5; margin: 0 0 24px 0; font-size: 15px;">
                                Нажмите на кнопку ниже, чтобы создать новый пароль для вашей учетной записи.
                            </p>
                            
                            <!-- Button -->
                            <a href="{{resetLink}}" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%); color: #ffffff; padding: 12px 28px; text-decoration: none; border-radius: 8px; font-size: 15px; font-weight: 600; display: inline-block; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);">
                                Сбросить пароль
                            </a>
                            
                            <p style="color: #707080; margin: 20px 0 8px 0; font-size: 12px;">
                                Или скопируйте ссылку:
                            </p>
                            
                            <table width="100%" cellpadding="0" cellspacing="0" style="table-layout: fixed;">
                                <tr>
                                    <td style="background-color: #0f0f18; border: 1px solid #2a2a3a; border-radius: 6px; padding: 10px 12px;">
                                        <p style="color: #ffffff; margin: 0; font-size: 11px; word-break: break-all; font-family: 'Courier New', monospace; line-height: 1.4;">{{resetLink}}</p>
                                    </td>
                                </tr>
                            </table>
                            
                            <p style="color: #707080; margin: 16px 0 0 0; font-size: 13px; line-height: 1.4;">
                                Ссылка действительна 15 минут.<br>
                                Если вы не запрашивали сброс пароля, проигнорируйте это письмо.
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #0f0f18; padding: 20px 30px; text-align: center; border-top: 1px solid #2a2a3a;">
                            <p style="color: #505060; margin: 0; font-size: 12px;">
                                © 2026 {{appName}}
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
