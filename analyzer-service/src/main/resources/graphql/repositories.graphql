query($username: String!, $after: String) {
  user(login: $username) {
    repositories(ownerAffiliations: OWNER, first: 100, after: $after) {
      nodes {
        name
        nameWithOwner
        isFork
        diskUsage
        stargazerCount
        forkCount
        primaryLanguage {
          name
        }
        languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
          edges {
            node {
              name
            }
            size
          }
          totalSize
        }
        pushedAt
        createdAt
        description
        hasIssuesEnabled
        issues(states: OPEN) {
          totalCount
        }
        defaultBranchRef {
          name
          target {
            ... on Commit {
              history {
                totalCount
              }
            }
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
