services:
  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_USER_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d user_service_db"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  user-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-ivakovv/devanalyzer}/user-service:${IMAGE_TAG:-latest}
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      DB_USER: ${DB_USER}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/user_service_db
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      S3_GET_URL_VALIDITY: ${S3_GET_URL_VALIDITY}
      S3_PUT_URL_VALIDITY: ${S3_PUT_URL_VALIDITY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      postgres-user:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres-analyzer:
    image: postgres:16
    environment:
      POSTGRES_DB: ${ANALYZER_DB_NAME}
      POSTGRES_USER: ${ANALYZER_DB_USERNAME}
      POSTGRES_PASSWORD: ${ANALYZER_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_analyzer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYZER_DB_USERNAME} -d ${ANALYZER_DB_NAME}"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_JDBC_URL: jdbc:postgresql://postgres-sonar:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      postgres-sonar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G

  postgres-sonar:
    image: postgres:16
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    ports:
      - "5434:5432"
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  analyzer-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-ivakovv/devanalyzer}/analyzer-service:${IMAGE_TAG:-latest}
    build: ./analyzer-service
    ports:
      - "8082:8082"
    environment:
      ANALYZER_DB_URL: jdbc:postgresql://postgres-analyzer:5432/${ANALYZER_DB_NAME}
      ANALYZER_DB_USERNAME: ${ANALYZER_DB_USERNAME}
      ANALYZER_DB_PASSWORD: ${ANALYZER_DB_PASSWORD}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      KAFKA_SERVERS: kafka:29092
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      SCAN_TEMP_DIR: /tmp/scans
      KAFKA_CONSUMER_CONCURRENCY: ${KAFKA_CONSUMER_CONCURRENCY}
      API_SERVER_URL: ${API_SERVER_URL}
    volumes:
      - scan_temp:/tmp/scans
    depends_on:
      postgres-analyzer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      sonarqube:
        condition: service_started
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9009:9009"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./analytic-service/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: devanalyzer
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G

  analytic-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-ivakovv/devanalyzer}/analytic-service:${IMAGE_TAG:-latest}
    build: ./analytic-service
    ports:
      - "8083:8083"
    environment:
      KAFKA_SERVERS: kafka:29092
      CLICKHOUSE_URL: ${CLICKHOUSE_URL}
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  gateway-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-ivakovv/devanalyzer}/gateway-service:${IMAGE_TAG:-latest}
    build: ./gateway-service
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      ANALYZER_SERVICE_URL: ${ANALYZER_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRATION: ${ACCESS_TOKEN_EXPIRATION}
      REFRESH_TOKEN_EXPIRATION: ${REFRESH_TOKEN_EXPIRATION}
      PASSWORD_RESET_TOKEN_EXPIRATION: ${PASSWORD_RESET_TOKEN_EXPIRATION}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      KAFKA_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_SERVER_URL: ${API_SERVER_URL}
      ANALYTIC_SERVICE_URL: ${ANALYTIC_SERVICE_URL}
    depends_on:
      user-service:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G

volumes:
  postgres_user_data:
  postgres_analyzer_data:
  postgres_sonar_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  scan_temp:
  clickhouse_data:
