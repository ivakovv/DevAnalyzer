services:
  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_USER_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
volumes:
  postgres_user_data: