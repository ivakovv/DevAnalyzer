name: Deploy to VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devanalyzer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [gateway-service, user-service, analyzer-service]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build ${{ matrix.service }}
      run: |
        cd ${{ matrix.service }}
        mvn clean package -DskipTests

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          # Переход в директорию проекта
          cd ~/DevAnalyzer || exit 1
          
          # Сохранение локальных изменений (.env и другие)
          git stash
          
          # Обновление кода из репозитория
          git fetch origin
          git checkout main
          git pull origin main
          
          # Восстановление локальных изменений
          git stash pop || true
          
          # Логин в GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Обновление docker-compose.yaml с новыми образами
          export IMAGE_TAG=${{ github.sha }}
          
          # Остановка старых контейнеров
          docker-compose down
          
          # Подтягивание новых образов
          docker-compose pull
          
          # Запуск новых контейнеров
          docker-compose up -d
          
          # Очистка старых образов
          docker image prune -af
          
          # Проверка статуса
          docker-compose ps

    - name: Health Check
      run: |
        echo "Ожидание запуска сервисов..."
        sleep 120
        
        echo "Проверка health endpoint..."
        for i in {1..10}; do
          if curl -f http://${{ secrets.VM_HOST }}:8080/actuator/health; then
            echo "Gateway service is healthy!"
            exit 0
          fi
          echo "Попытка $i/10 не удалась, ожидание 10 секунд..."
          sleep 10
        done
        
        echo "Health check failed after 10 attempts"
        exit 1
